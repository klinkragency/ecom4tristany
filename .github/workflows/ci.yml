name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: shop
          POSTGRES_PASSWORD: shop
          POSTGRES_DB: shop
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U shop -d shop"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://shop:shop@localhost:5432/shop?sslmode=disable
      CSRF_KEY: test-test-test-test-test-test-test-test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest
      - name: Apply migrations
        run: $(go env GOPATH)/bin/goose -dir internal/db/migrations postgres "$DATABASE_URL" up
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build
        run: |
          go build ./cmd/api
          go build ./cmd/seed-admin

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Typecheck admin
        run: cd admin && bun run typecheck
      - name: Typecheck storefront
        run: cd storefront && bun run typecheck
      - name: Build admin
        run: cd admin && bun run build
      - name: Build storefront
        run: cd storefront && bun run build
