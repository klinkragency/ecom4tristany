version: "3"

dotenv: [".env"]

vars:
  BACKEND_DIR: backend
  MIGRATIONS_DIR: backend/internal/db/migrations
  GOOSE_DRIVER: postgres

tasks:
  # ─── Setup ─────────────────────────────────────────────────────────────
  install:
    desc: Install all deps (Go + Bun workspaces)
    cmds:
      - cd {{.BACKEND_DIR}} && go mod download
      - bun install

  # ─── Dev ───────────────────────────────────────────────────────────────
  db:up:
    desc: Start Postgres in Docker
    cmds:
      - docker compose up -d postgres
      - docker compose exec -T postgres sh -c "until pg_isready -U shop -d shop; do sleep 1; done"

  db:down:
    desc: Stop Postgres
    cmds:
      - docker compose stop postgres

  db:reset:
    desc: Drop and recreate the database
    cmds:
      - docker compose exec -T postgres psql -U shop -d postgres -c "DROP DATABASE IF EXISTS shop"
      - docker compose exec -T postgres psql -U shop -d postgres -c "CREATE DATABASE shop"
      - task: migrate:up

  dev:
    desc: Start backend, admin, storefront concurrently (run `task db:up` first)
    deps: [db:up]
    cmds:
      - task: migrate:up
      - |
        (cd {{.BACKEND_DIR}} && $(go env GOPATH)/bin/air) &
        (cd admin && bun run dev) &
        (cd storefront && bun run dev) &
        wait

  # ─── Migrations ────────────────────────────────────────────────────────
  migrate:up:
    desc: Apply all pending migrations
    cmds:
      - goose -dir {{.MIGRATIONS_DIR}} {{.GOOSE_DRIVER}} "$DATABASE_URL" up

  migrate:down:
    desc: Roll back the most recent migration
    cmds:
      - goose -dir {{.MIGRATIONS_DIR}} {{.GOOSE_DRIVER}} "$DATABASE_URL" down

  migrate:status:
    desc: Show migration status
    cmds:
      - goose -dir {{.MIGRATIONS_DIR}} {{.GOOSE_DRIVER}} "$DATABASE_URL" status

  migrate:new:
    desc: 'Create a new migration. Usage: task migrate:new -- NAME'
    cmds:
      - goose -dir {{.MIGRATIONS_DIR}} -s create {{.CLI_ARGS}} sql

  # ─── Codegen ───────────────────────────────────────────────────────────
  sqlc:
    desc: Regenerate sqlc code from SQL queries
    cmds:
      - cd {{.BACKEND_DIR}} && sqlc generate

  # ─── Seed ──────────────────────────────────────────────────────────────
  seed:admin:
    desc: 'Seed the first admin. Usage: task seed:admin -- --email=x --password=y'
    cmds:
      - cd {{.BACKEND_DIR}} && go run ./cmd/seed-admin {{.CLI_ARGS}}

  # ─── Test ──────────────────────────────────────────────────────────────
  test:
    desc: Run all tests (Go + frontends)
    deps: [test:go, test:fe]

  test:go:
    desc: Run Go tests
    cmds:
      - cd {{.BACKEND_DIR}} && go test ./...

  test:fe:
    desc: Run frontend tests
    cmds:
      - cd admin && bun test
      - cd storefront && bun test

  test:e2e:
    desc: Run Playwright smoke tests
    cmds:
      - cd e2e && bun run test

  # ─── Lint / Build ──────────────────────────────────────────────────────
  lint:
    desc: Lint everything
    cmds:
      - cd {{.BACKEND_DIR}} && go vet ./...
      - cd admin && bun run lint
      - cd storefront && bun run lint

  build:
    desc: Build backend + frontends
    cmds:
      - cd {{.BACKEND_DIR}} && go build -o bin/api ./cmd/api
      - cd {{.BACKEND_DIR}} && go build -o bin/seed-admin ./cmd/seed-admin
      - cd admin && bun run build
      - cd storefront && bun run build
