services:
  postgres:
    image: postgres:17-alpine
    container_name: shop_postgres
    environment:
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop
      POSTGRES_DB: shop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop -d shop"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Mailpit: local SMTP + webmail UI for inspecting transactional emails in dev.
  # Backend sends to 1025 (SMTP), browse captured messages at http://localhost:8025.
  mailpit:
    image: axllent/mailpit:latest
    container_name: shop_mailpit
    ports:
      - "1025:1025"   # SMTP in
      - "8025:8025"   # web UI
    restart: unless-stopped

# Object storage uses Cloudflare R2 — see S3_* vars in .env.

volumes:
  postgres_data:
