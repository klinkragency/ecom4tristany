services:
  postgres:
    image: postgres:17-alpine
    container_name: shop_postgres
    environment:
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop
      POSTGRES_DB: shop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop -d shop"]
      interval: 5s
      timeout: 3s
      retries: 10

# Mailpit (local SMTP + webmail UI for inspecting transactional emails in dev)
# lives either in Docker or native install (`brew install mailpit`).
# SMTP on 1025, UI at http://localhost:8025. If you don't have mailpit natively,
# uncomment this block:
#  mailpit:
#    image: axllent/mailpit:latest
#    container_name: shop_mailpit
#    ports:
#      - "1025:1025"   # SMTP in
#      - "8025:8025"   # web UI
#    restart: unless-stopped

# Object storage uses Cloudflare R2 — see S3_* vars in .env.

volumes:
  postgres_data:
