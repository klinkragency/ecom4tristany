services:
  postgres:
    image: postgres:17-alpine
    container_name: shop_postgres
    environment:
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop
      POSTGRES_DB: shop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop -d shop"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: shop_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: shopminio
      MINIO_ROOT_PASSWORD: shopminio-secret
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: shop_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 shopminio shopminio-secret;
      mc mb -p local/shop-media || true;
      mc anonymous set download local/shop-media || true;
      echo 'minio init done';
      "

volumes:
  postgres_data:
  minio_data:
